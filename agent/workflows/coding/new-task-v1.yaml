# The migrated `new_task` task type: implement a GitHub issue or free-text task
# and open a pull request. This is the heavyweight coding path — clone, build,
# open-PR — selected explicitly via workflow_ref (or the new_task → coding/new-task-v1
# caller migration mapping), never reached by the resolution fallback.
#
# See docs/design/WORKFLOWS.md §"Example: shipped coding workflow (new_task)".
id: coding/new-task-v1
version: 1.0.0
domain: coding
description: Implement a GitHub issue or free-text task and open a pull request.
requires_repo: true
read_only: false
prompt:
  # Registry-resolved in Phase 4 (#246); in Phases 1-3 the runner uses the
  # existing base + new_task prompt modules (agent/src/prompts/).
  template: registry://prompt/coding-new-task-workflow
  placeholders:
    - repo_url
    - task_id
    - workspace
    - branch_name
    - default_branch
    - max_turns
    - setup_notes
    - memory_context
hydration:
  sources: [issue, memory, task_description]
agent_config:
  tier: standard
  allowed_tools: [Bash, Read, Write, Edit, Glob, Grep, WebFetch]
  cedar_policy_modules: [builtin/hard_deny, builtin/soft_deny]
repo_config:
  # github is the only implemented provider today; named explicitly so adding a
  # second provider stays non-breaking (WORKFLOWS.md §"VCS provider abstraction").
  provider: github
  # Load the repo's CLAUDE.md / .claude/rules / .mcp.json and layer agent_config
  # underneath it (repo-specific guidance wins).
  discover: true
required_inputs:
  one_of: [issue_number, task_description]
steps:
  - { kind: clone_repo,      name: setup }
  - { kind: hydrate_context, name: context }
  - { kind: run_agent,       name: implement }
  - { kind: verify_build,    name: build, gate: regression_only }
  - { kind: ensure_pr,       name: open_pr, strategy: create }
terminal_outcomes:
  primary: pr_url
limits:
  max_turns: 100
promotion_gate:
  # Concrete test target now; becomes eval:new_task once #236 lands.
  requires: [tests:agent/new_task]
status: production
