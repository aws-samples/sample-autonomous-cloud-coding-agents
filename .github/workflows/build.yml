name: build
on:
  pull_request: {}
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: "true"
      MISE_EXPERIMENTAL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install mise
        uses: jdx/mise-action@v3.6.2
        with:
          cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
      - name: Install dependencies
        run: mise run install
      - name: build
        run: mise run build
