name: review-gate

# Automated PR review gate. When `build` (or `integ`) completes on a PR head
# SHA, this workflow aggregates ALL check-runs + commit statuses to decide if CI
# is green, then inspects mergeability and either (a) tells the author what to
# fix, (b) updates an out-of-date branch so CI re-runs, or (c) triggers the ABCA
# `coding/pr-review-v1` agent via the Task API webhook so a structured review is
# waiting before a human looks.
#
# Trigger model mirrors integ.yml / deploy.yml: `workflow_run` runs in the
# TRUSTED base-repo context, so secrets/vars/PAT are available even for fork PRs
# (a fork `pull_request` job gets none). Unlike those workflows we also react to
# a FAILED build so we can post the "tests failing" comment, and we listen to
# `integ` too so the gate re-pulses once the slow `integ-smoke` status resolves.
#
# This gate posts COMMENTS ONLY — no check-run, no commit status, no formal
# review — so it never interferes with Mergify (status-success=build,
# #approved-reviews-by>=1, dismiss-stale-approvals-on-push) or the required
# integ-smoke gate. It is a strictly advisory orchestration layer.
#
# OPERATOR SETUP (see plan): repo vars ABCA_TASK_API_URL, ABCA_WEBHOOK_ID; repo
# secrets ABCA_WEBHOOK_SECRET, AUTOMATION_GITHUB_TOKEN (exists). Register the
# webhook with `bgagent webhook create`; its Secrets Manager secret
# (bgagent/webhook/<id>) must equal ABCA_WEBHOOK_SECRET.
on:
  # zizmor: ignore[dangerous-triggers] — intentional; workflow_run is required so
  # this runs in the trusted base-repo context (secrets/PAT available for fork
  # PRs). Mitigations: no PR code is checked out or executed (pure gh api/curl),
  # least-privilege permissions, all untrusted event fields passed via env only.
  workflow_run:
    workflows: [build, integ]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate (manual re-pulse)"
        required: true
        type: string

# One gate run per PR; a newer pulse supersedes an in-flight one. Fork PRs carry
# an empty workflow_run.pull_requests[], so fall back to the head SHA.
concurrency:
  group: >-
    review-gate-${{
      github.event.workflow_run.pull_requests[0].number
      || github.event.workflow_run.head_sha
      || inputs.pr_number
      || github.ref
    }}
  cancel-in-progress: true

permissions: {}

jobs:
  gate:
    name: review-gate
    # React to a completed build/integ (any conclusion — the check aggregation
    # decides the verdict) or a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: write   # read PR, update-branch fallback
      issues: write          # upsert PR (issue) comments
      contents: read         # read commits/*
      checks: read           # read check-runs
      statuses: read         # read commit statuses (integ-smoke etc.)
    steps:
      # -------------------------------------------------------------------
      # Resolve PR context. All untrusted event fields flow through env (never
      # inlined into run:) to satisfy zizmor template-injection.
      # -------------------------------------------------------------------
      - name: Resolve PR context
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.workflow_run.pull_requests[0].number }}
          PR_NUMBER_FROM_INPUT: ${{ inputs.pr_number }}
          WF_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WF_HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
        run: |
          set -euo pipefail

          resolve_pr_number() {
            if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              echo "$PR_NUMBER_FROM_INPUT"; return
            fi
            if [[ -n "$PR_NUMBER_FROM_EVENT" ]]; then
              echo "$PR_NUMBER_FROM_EVENT"; return
            fi
            # Fork PRs: workflow_run.pull_requests[] is empty — resolve via API.
            gh api "repos/$REPO/commits/$WF_HEAD_SHA/pulls" --jq '.[0].number // empty' 2>/dev/null || true
          }

          PR_NUMBER="$(resolve_pr_number)"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "::notice::No PR resolved for this event — nothing to gate; skipping."
            echo "applicable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "applicable=true"
            echo "pr_number=$PR_NUMBER"
            echo "head_repo=$WF_HEAD_REPO"
          } >> "$GITHUB_OUTPUT"
          echo "Gating PR #$PR_NUMBER (trigger=$EVENT_NAME)"

      # -------------------------------------------------------------------
      # Evaluate the gate. Reads + comments use GITHUB_TOKEN; update-branch
      # uses the PAT (in a subshell) so the push re-fires `build`.
      # -------------------------------------------------------------------
      - name: Evaluate gate
        if: steps.resolve.outputs.applicable == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          HEAD_REPO_FROM_EVENT: ${{ steps.resolve.outputs.head_repo }}
          ABCA_TASK_API_URL: ${{ vars.ABCA_TASK_API_URL }}
          ABCA_WEBHOOK_ID: ${{ vars.ABCA_WEBHOOK_ID }}
          ABCA_WEBHOOK_SECRET: ${{ secrets.ABCA_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          MARKER='<!-- abca-review-gate -->'
          SELF_CHECK='review-gate'          # exclude our own check-run (no self-deadlock)
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"

          # Join args with newlines to build a markdown comment body. Keeping the
          # markdown inside function args (not a YAML-level multi-line string)
          # avoids column-0 lines that would break this block scalar.
          render() { printf '%s\n' "$@"; }

          # ---- Resolve the PR's CURRENT state; operate only on live head. -----
          # The workflow_run head_sha can be stale (PR advanced since build ran).
          # Read the PR's current head + state once and key everything off it, so
          # checks + mergeability + review target stay mutually consistent.
          PR_JSON="$(gh api "repos/$REPO/pulls/$PR_NUMBER")"
          PR_STATE="$(echo "$PR_JSON" | jq -r '.state')"
          HEAD_SHA="$(echo "$PR_JSON"  | jq -r '.head.sha')"
          HEAD_REPO="$(echo "$PR_JSON" | jq -r '.head.repo.full_name // empty')"
          IS_DRAFT="$(echo "$PR_JSON"  | jq -r '.draft')"
          [[ -z "$HEAD_REPO" ]] && HEAD_REPO="$HEAD_REPO_FROM_EVENT"
          SHORT_SHA="${HEAD_SHA:0:7}"

          if [[ "$PR_STATE" != "open" ]]; then
            echo "PR #$PR_NUMBER is $PR_STATE — nothing to gate."
            exit 0
          fi
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "PR #$PR_NUMBER is a draft — skipping."
            exit 0
          fi
          echo "PR #$PR_NUMBER open @ $HEAD_SHA (head_repo=$HEAD_REPO)"

          # ---- Upsert a single marker comment (edit-in-place, never spam). ----
          upsert_comment() {
            local body="$1" existing_id
            existing_id="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
              --jq "[.[] | select(.body | contains(\"$MARKER\")) | .id] | first // empty")"
            if [[ -n "$existing_id" ]]; then
              gh api -X PATCH "repos/$REPO/issues/comments/$existing_id" -f body="$body" >/dev/null
            else
              gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$body" >/dev/null
            fi
          }

          # ---- Per-SHA review dedup: already triggered a review for this SHA? --
          already_reviewed_this_sha() {
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
              --jq "[.[] | select(.body | contains(\"abca-review-gate:reviewed-sha=$HEAD_SHA\")) | .id] | first // empty"
          }

          # ---- Aggregate check-runs (latest only) + commit statuses. ----------
          # Failing: run conclusion in {failure,timed_out,cancelled,action_required,
          # startup_failure} or status state in {failure,error}. neutral/skipped/
          # stale/success => pass. Excludes our own check by name.
          evaluate_checks() {
            local runs_json status_json
            runs_json="$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs?filter=latest" --paginate \
              --jq '.check_runs[] | {name, status, conclusion}' | jq -s '.')"
            status_json="$(gh api "repos/$REPO/commits/$HEAD_SHA/status")"

            local failed_runs pending_runs failed_status pending_status
            failed_runs="$(echo "$runs_json" | jq -r --arg self "$SELF_CHECK" '
              .[] | select(.name != $self)
                  | select(.conclusion == "failure" or .conclusion == "timed_out"
                        or .conclusion == "cancelled" or .conclusion == "action_required"
                        or .conclusion == "startup_failure") | .name')"
            pending_runs="$(echo "$runs_json" | jq -r --arg self "$SELF_CHECK" '
              .[] | select(.name != $self) | select(.status != "completed") | .name')"
            failed_status="$(echo "$status_json" | jq -r '
              .statuses[] | select(.state == "failure" or .state == "error") | .context')"
            pending_status="$(echo "$status_json" | jq -r '
              .statuses[] | select(.state == "pending") | .context')"

            FAILING="$(printf '%s\n%s\n' "$failed_runs" "$failed_status" | sed '/^$/d' | sort -u)"
            PENDING="$(printf '%s\n%s\n' "$pending_runs" "$pending_status" | sed '/^$/d' | sort -u)"
          }

          # ---- 1. Check aggregation, with a short bounded poll for pending. ----
          FAILING=""; PENDING=""
          for attempt in $(seq 1 8); do          # ~8 * 15s ~= 2 min cap
            evaluate_checks
            [[ -n "$FAILING" ]] && break
            [[ -z "$PENDING" ]] && break
            echo "Checks still pending (attempt $attempt): $(echo "$PENDING" | tr '\n' ' ')"
            sleep 15
          done

          if [[ -n "$FAILING" ]]; then
            # Backticks below are literal markdown (inline code around each check
            # name), not command substitution — single quotes are intentional.
            # shellcheck disable=SC2016
            LIST="$(echo "$FAILING" | sed 's/^/- `/; s/$/`/')"
            BODY="$(render \
              "$MARKER" \
              "### ❌ CI is failing" \
              "" \
              "The following checks are not passing on \`$SHORT_SHA\`. Please address them before ABCA review:" \
              "" \
              "$LIST" \
              "" \
              "_This is an automated gate; it re-checks on every CI run. [View the latest run]($RUN_URL)._")"
            upsert_comment "$BODY"
            echo "Failing checks present — commented and stopping."
            exit 0
          fi

          if [[ -n "$PENDING" ]]; then
            echo "Checks still pending after poll — exiting quietly; a later pulse re-evaluates."
            exit 0
          fi
          echo "All checks green for $HEAD_SHA."

          # ---- 2. Mergeability (poll until mergeable != null). ----------------
          # GitHub computes .mergeable asynchronously; a fresh GET can return null.
          MERGEABLE="null"; MSTATE="unknown"
          for attempt in $(seq 1 10); do          # ~10 * 6s ~= 1 min cap
            read -r MERGEABLE MSTATE < <(
              gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '"\(.mergeable) \(.mergeable_state)"'
            )
            [[ "$MERGEABLE" != "null" ]] && break
            sleep 6
          done
          echo "mergeable=$MERGEABLE mergeable_state=$MSTATE"

          # ---- 2a. Merge conflict. -------------------------------------------
          if [[ "$MSTATE" == "dirty" || "$MERGEABLE" == "false" ]]; then
            BODY="$(render \
              "$MARKER" \
              "### ⚠️ Merge conflict" \
              "" \
              "This PR has conflicts with the base branch. Please resolve them and push — the gate re-runs automatically once CI passes on the updated branch, then requests an ABCA review.")"
            upsert_comment "$BODY"
            echo "Merge conflict — commented and stopping."
            exit 0
          fi

          # ---- 2b. Behind base — update branch (PAT so build re-fires). ------
          if [[ "$MSTATE" == "behind" ]]; then
            if [[ "$HEAD_REPO" != "$REPO" ]]; then
              # Cross-fork update-branch needs "maintainer can modify" + write to
              # the fork; the PAT usually can't push there. Ask the author.
              BODY="$(render \
                "$MARKER" \
                "### 🔄 Branch is out of date" \
                "" \
                "This fork PR is behind the base branch. Please update your branch (merge or rebase the base) and push so CI re-runs.")"
              upsert_comment "$BODY"
              echo "Behind + fork PR — cannot update-branch with PAT; commented."
              exit 0
            fi
            if [[ -z "${AUTOMATION_TOKEN:-}" ]]; then
              BODY="$(render \
                "$MARKER" \
                "### 🔄 Branch is out of date" \
                "" \
                "This branch is behind the base. Please update it (merge or rebase the base) and push so CI re-runs.")"
              upsert_comment "$BODY"
              echo "::warning::AUTOMATION_GITHUB_TOKEN unset — cannot auto-update; asked author."
              exit 0
            fi
            # Same-repo branch: merge base into head. PAT push re-triggers build.
            if GH_TOKEN="$AUTOMATION_TOKEN" gh api -X PUT \
                 "repos/$REPO/pulls/$PR_NUMBER/update-branch" \
                 -f expected_head_sha="$HEAD_SHA" >/dev/null 2>&1; then
              BODY="$(render \
                "$MARKER" \
                "### 🔄 Updated branch, re-running CI" \
                "" \
                "Merged the base branch in to bring this branch up to date. CI will re-run; the gate re-evaluates and requests an ABCA review once it's green.")"
              upsert_comment "$BODY"
              echo "update-branch succeeded — commented and stopping."
            else
              BODY="$(render \
                "$MARKER" \
                "### 🔄 Branch is out of date" \
                "" \
                "Automatic branch update did not succeed. Please update your branch (merge or rebase the base) and push so CI re-runs.")"
              upsert_comment "$BODY"
              echo "::warning::update-branch failed — asked author to update manually."
            fi
            exit 0
          fi

          # ---- 2c. Green + not-behind + not-dirty → trigger ABCA review. -----
          # NOTE: we intentionally do NOT require mergeable_state == 'clean'. With
          # branch protection requiring an approval, a green conflict-free PR
          # reports 'blocked' (awaiting review), never 'clean' — the whole point
          # is to review BEFORE a human approves. clean/blocked/unstable all pass.
          if [[ -n "$(already_reviewed_this_sha)" ]]; then
            echo "ABCA review already triggered for $HEAD_SHA — nothing to do."
            exit 0
          fi

          if [[ -z "${ABCA_TASK_API_URL:-}" || -z "${ABCA_WEBHOOK_ID:-}" || -z "${ABCA_WEBHOOK_SECRET:-}" ]]; then
            echo "::error::ABCA webhook not configured (need vars ABCA_TASK_API_URL, ABCA_WEBHOOK_ID and secret ABCA_WEBHOOK_SECRET)."
            exit 1
          fi

          # Body SIGNED must be byte-identical to body POSTED. jq -c emits no
          # trailing newline; printf '%s' + curl --data-raw send it verbatim.
          POST_BODY="$(jq -nc --arg repo "$REPO" --argjson pr "$PR_NUMBER" \
            '{workflow_ref:"coding/pr-review-v1", repo:$repo, pr_number:$pr}')"
          # openssl output is "(stdin)= <hex>" or "SHA2-256(stdin)= <hex>"; take last.
          SIG="$(printf '%s' "$POST_BODY" | openssl dgst -sha256 -hmac "$ABCA_WEBHOOK_SECRET" | awk '{print $NF}')"

          HTTP_CODE="$(curl -sS -o /tmp/abca-resp.txt -w '%{http_code}' \
            -X POST "${ABCA_TASK_API_URL%/}/webhooks/tasks" \
            -H 'Content-Type: application/json' \
            -H "X-Webhook-Id: $ABCA_WEBHOOK_ID" \
            -H "X-Webhook-Signature: sha256=$SIG" \
            -H "Idempotency-Key: review-$REPO-$PR_NUMBER-$HEAD_SHA" \
            --data-raw "$POST_BODY")"

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            BODY="$(render \
              "$MARKER" \
              "<!-- abca-review-gate:reviewed-sha=$HEAD_SHA -->" \
              "### 🤖 ABCA review requested" \
              "" \
              "CI is green and the branch is up to date, so an automated ABCA review of \`$SHORT_SHA\` has been requested. Findings will be posted here shortly.")"
            upsert_comment "$BODY"
            echo "ABCA review triggered for $HEAD_SHA (HTTP $HTTP_CODE)."
          else
            echo "::error::Task API webhook returned HTTP $HTTP_CODE"
            cat /tmp/abca-resp.txt || true
            exit 1
          fi
