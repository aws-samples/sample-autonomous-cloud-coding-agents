name: integ

# Phase-0 deploy-then-verify integration tests (issue #236). integ-runner
# deploys a trimmed Task API stack into the account behind
# secrets.AWS_ROLE_TO_ASSUME, runs the create-and-persist smoke assertions, then
# tears the stack down. Deliberately
# NOT triggered per-PR — it deploys billable resources into a shared account, so
# it runs only on manual dispatch and on a nightly schedule.
on:
  workflow_dispatch: {}
  schedule:
    # Nightly: 07:00 UTC
    - cron: "0 7 * * *"

# Only one integ run at a time against the shared account — overlapping
# deploys would collide on the backgroundagent-integ stack.
concurrency:
  group: cdk-integ
  cancel-in-progress: false

permissions: {}

jobs:
  integ:
    name: CDK integ smoke (Task API)
    runs-on: ubuntu-latest
    # Run in the `integ` GitHub Environment. This is mandatory, not cosmetic:
    # AWS_ROLE_TO_ASSUME is an environment-scoped secret (see deploy.yml, where
    # the diff/deploy jobs each declare an environment), so a job with no
    # environment resolves it to empty and configure-aws-credentials fails. The
    # role's OIDC trust also gates on `sub = repo:...:environment:integ`, so the
    # environment name must be added to that trust policy (account-side setup).
    environment: integ
    # Only run against main. workflow_dispatch can target any branch, and the
    # job assumes the privileged integ role — without this guard a feature-branch
    # edit to test/integ/*.ts could be dispatched and run against that role.
    # Complements the OIDC trust-policy `sub` restriction (defence in depth).
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
    env:
      CI: "true"
      MISE_EXPERIMENTAL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          # Fall back to us-east-1 if the repo variable is unset, so the action
          # never runs region-less (which would fail credential resolution).
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run integ tests (deploy → assert → destroy)
        run: mise //cdk:integ

      # Safety net: integ-runner forces teardown on success and failure, but if
      # the run is cancelled or crashes mid-deploy the stack can be stranded in
      # the shared account. Delete it directly via CloudFormation so we never
      # leak billable resources.
      #
      # NOTE: `cdk destroy backgroundagent-integ` would NOT work here — it
      # synthesizes the main app (src/main.ts), which does not contain the integ
      # stack, so it exits 0 having deleted nothing. Target the stack by its
      # literal CloudFormation name instead. delete-stack is idempotent (no-op if
      # already gone), so `|| true` only guards transient API errors.
      - name: Ensure stack torn down
        if: always()
        run: |
          aws cloudformation delete-stack --stack-name backgroundagent-integ || true
          aws cloudformation wait stack-delete-complete --stack-name backgroundagent-integ || true
