version: 2

updates:
  # GitHub Actions — all action bumps in a single PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): github-actions"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns: ["*"]

  # Docker — base image bumps (typically 1-2 images)
  - package-ecosystem: "docker"
    directory: "/agent"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): docker"
    open-pull-requests-limit: 1
    groups:
      all-docker:
        patterns: ["*"]

  # Python (pip/uv) — all Python deps in a single PR
  - package-ecosystem: "pip"
    directory: "/agent"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): pip"
    open-pull-requests-limit: 1
    groups:
      all-python:
        patterns: ["*"]

  # npm — all JS deps in a single PR (CI catches incompatibilities)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): npm"
    open-pull-requests-limit: 1
    groups:
      all-npm:
        patterns: ["*"]
