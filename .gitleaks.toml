title = "sample-autonomous-cloud-coding-agents"

[extend]
useDefault = true

[[allowlists]]
description = "PEM-shaped fixtures for output_scanner / hook tests (not real keys)."
targetRules = ["private-key"]
paths = [
    "^agent/tests/test_hooks\\.py$",
    "^agent/tests/test_output_scanner\\.py$",
]

[[allowlists]]
description = "Mock workload access token in CDK handler tests (not a real credential)."
stopwords = ["wat-opaque-123"]

[[allowlists]]
description = "Test fixture signing secret in Slack verification unit test (not a real credential)."
stopwords = ["test-signing-secret-abc123"]

# Catch bare 12-digit AWS account IDs. The default ruleset does not flag these,
# which is how a real account ID reached a committed comment in the #236 integ
# work. RE2 (Go) has no lookarounds, so the non-digit neighbours are captured in
# non-capturing groups; the account ID itself is group 1.
[[rules]]
id = "aws-account-id"
description = "AWS account ID (12-digit, bare or in ARN/role context)"
regex = '''(?:^|[^0-9])([0-9]{12})(?:[^0-9]|$)'''
# Report/redact capture group 1 (the bare 12-digit ID) rather than the whole
# match, which would include the non-digit delimiter neighbours.
secretGroup = 1
keywords = [
    "account",
    "aws",
    "arn:aws",
    "iam::",
    "role/",
    "assumed-role",
    "AWS_ACCOUNT",
    "AccountId",
    "account_id",
]

[[rules.allowlists]]
description = "AWS-published placeholder IDs, localstack default, and lockfiles/snapshots."
regexes = [
    '''123456789012''',
    '''000000000000''',
    '''111122223333''',
    '''444455556666''',
]
paths = [
    '''(.*/)?test/.*\.snapshot/.*''',
    '''(.*/)?CHANGELOG\.md$''',
    '''(.*/)?yarn\.lock$''',
    '''(.*/)?package-lock\.json$''',
    '''(.*/)?uv\.lock$''',
]
# Per-line opt-out: append `# gitleaks:allow account-id` on a legitimate line.
stopwords = ["gitleaks:allow account-id"]

[[rules.allowlists]]
# False positives where a 12-digit run is NOT an AWS account ID:
#  - GitHub Action commit-SHA pins contain digit runs (e.g. jdx/mise-action
#    `…981980618f…` matches `629881980618`).
#  - threat-composer artifacts use v4 UUIDs whose final node can be all digits
#    (e.g. `f30d02f6-9750-46ad-b710-398303478932`).
#  - Test fixtures use the RFC-4122 example UUID `…-446655440000`.
# These files contain no real account IDs; scope the exemption by path.
description = "Non-account 12-digit runs: workflow SHA pins, threat-composer UUIDs, test-fixture UUIDs."
regexTarget = "line"
paths = [
    '''^\.github/workflows/.*\.ya?ml$''',
    '''^\.threat-composer/.*\.json$''',
    '''^cdk/test/.*\.test\.ts$''',
]
